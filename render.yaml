services:
  - type: web
    name: friday-backend
    env: python
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PRIMARY_AI_API_KEY
        sync: false 
      - key: VISION_API_KEY
        sync: false
      - key: WEATHER_API_KEY
        sync: false
